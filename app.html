<!DOCTYPE html>
<html {{ HTML_ATTRS }}>
  <head>
    <script>
      (function () {
        try {
          var k = 'ph-color-scheme'
          var valid = ['paper', 'ink', 'sepia', 'qi', 'historic', 'parchment']
          var s = localStorage.getItem(k)
          if (s && valid.indexOf(s) !== -1) {
            document.documentElement.setAttribute('data-color-scheme', s)
          } else {
            document.documentElement.setAttribute('data-color-scheme', 'parchment')
          }
        } catch (e) {
          document.documentElement.setAttribute('data-color-scheme', 'parchment')
        }
      })()
    </script>
    {{ HEAD }}
  </head>
  <body {{ BODY_ATTRS }}>
    {{ APP }}
  </body>
</html>
